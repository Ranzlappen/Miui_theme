<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Android Theme Studio — MIUI Theme Designer</title>
<meta name="description" content="A fully customizable, browser-based MIUI theme designer with live preview and .mtz export. No install, no server — runs entirely in your browser.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<header id="topbar">
  <div class="brand">
    <span class="brand-logo">🎨</span>
    <div class="brand-text">
      <h1>Android Theme Studio</h1>
      <span class="brand-sub" id="platform-name">MIUI Theme Designer</span>
    </div>
  </div>
  <div class="topbar-center">
    <input id="field-search" type="search" placeholder="Search any setting… (e.g. clock, accent, status bar)" autocomplete="off">
  </div>
  <div class="topbar-actions">
    <select id="platform-select" title="Target platform"></select>
    <button id="btn-undo" class="btn ghost" title="Undo (Ctrl+Z)">↶</button>
    <button id="btn-redo" class="btn ghost" title="Redo (Ctrl+Shift+Z)">↷</button>
    <button id="btn-xml" class="btn ghost" title="Preview the generated theme files">View files</button>
    <button id="btn-import" class="btn" title="Import a saved project (.json)">Import</button>
    <button id="btn-save" class="btn" title="Download project as .json">Save project</button>
    <button id="btn-export" class="btn primary" title="Export installable theme package">⬇ Export .mtz</button>
  </div>
</header>

<main id="layout">

  <nav id="section-nav" aria-label="Theme sections"></nav>

  <section id="panel">
    <div id="panel-head">
      <h2 id="panel-title"></h2>
      <p id="panel-desc"></p>
      <button id="panel-reset" class="btn ghost small" title="Reset this section to defaults">Reset section</button>
    </div>
    <div id="panel-fields"></div>
  </section>

  <section id="preview-pane">
    <div id="preview-tabs" role="tablist"></div>
    <div id="phone-wrap">
      <div id="phone">
        <div id="phone-notch"></div>
        <div id="statusbar">
          <span id="sb-clock">10:24</span>
          <span class="sb-spacer"></span>
          <span class="sb-icons">
            <svg class="sb-ic" viewBox="0 0 24 24"><path d="M2 22h20V2z" fill="currentColor"/></svg>
            <svg class="sb-ic" viewBox="0 0 24 24"><path d="M12 21 23 10a15.5 15.5 0 0 0-22 0z" fill="currentColor"/></svg>
            <span id="sb-batt"><span id="sb-batt-fill"></span></span>
          </span>
        </div>
        <div id="screens"></div>
        <div id="navbar">
          <span class="nav-pill"></span>
        </div>
      </div>
    </div>
    <div id="preview-note">Live preview · approximation of MIUI 12–14 rendering</div>
  </section>

</main>

<div id="modal-backdrop" hidden>
  <div id="modal" role="dialog" aria-modal="true">
    <div id="modal-head">
      <h3 id="modal-title">Generated files</h3>
      <button id="modal-close" class="btn ghost">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toasts"></div>
<input type="file" id="import-file" accept=".json,application/json" hidden>

<script src="js/vendor/jszip.min.js"></script>
<script src="js/util.js"></script>
<script src="js/platforms/registry.js"></script>
<script src="js/platforms/miui.js"></script>
<script src="js/state.js"></script>
<script src="js/controls.js"></script>
<script src="js/preview.js"></script>
<script src="js/export/mtz.js"></script>
<script src="js/app.js"></script>
</body>
</html>
